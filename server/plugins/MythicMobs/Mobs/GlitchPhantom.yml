# The Glitch — MythicMobs: Glitch Phantom (ranged/special mob)
# Flies, shoots projectiles. Appears in boss rooms and high-tier dungeons.

GlitchPhantom:
  Type: PHANTOM
  Display: '<light_purple>Glitch Phantom'
  Health: 60
  Damage: 4
  Options:
    MovementSpeed: 0.35
    AlwaysShowName: true
    Persistent: true
    Despawn: false
    FollowRange: 30
    KnockbackResistance: 0
  AIGoalSelectors:
    - clear
    - fly
    - float
    - lookatplayers
    - randomfly
  AITargetSelectors:
    - clear
    - players
  Skills:
    - effect:sound{s=entity.phantom.ambient;v=0.5;p=1.2} @self ~onSpawn 1
    - effect:sound{s=entity.phantom.hurt;v=0.7;p=0.9} @self ~onDamaged 0.4
    - effect:sound{s=entity.phantom.death;v=1;p=0.6} @self ~onDeath 1
    - projectile{onTick=model;damage=8;speed=1.5;hRange=4;vRange=4;interval=1} @target ~onTimer:60 0.5
  Drops:
    - GlitchPhantomLoot

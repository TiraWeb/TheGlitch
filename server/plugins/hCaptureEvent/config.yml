# The Glitch — hCaptureEvent: extraction zone config
# Seeded once by bootstrap.sh — box's copy wins after first boot.
# Wiki: https://github.com/TheMrEnginE/hCaptureEvent

# Prefix for all messages
prefix: "&8[&5Extraction&8] "

# Messages
messages:
  capturing: "&7Capturing... &e{progress}%"
  success: "&aCapture complete! &7+{reward} shards banked."
  failed: "&cCapture failed!"
  already-capturing: "&cYou are already capturing!"
  interrupted: "&cCapture interrupted!"
  no-permission: "&cYou don't have permission to capture here."

# Capture settings
capture:
  # Use WorldGuard regions for capture zones
  use-worldguard: true
  # Check interval (ticks)
  check-interval: 5
  # Minimum players in zone to start capture
  min-players: 1
  # Time in seconds to capture/extract
  capture-time: 10
  # Show boss bar during extraction
  boss-bar:
    enabled: true
    color: PURPLE
    style: SEGMENTED_10
    title: "&5Extracting..."
  # Show action bar progress
  action-bar:
    enabled: true
    message: "&5Extracting... &f{progress}%"
  # Particles during extraction
  particles:
    enabled: true
    type: END_ROD
    count: 5
    radius: 1.5

# Reward on capture completion
reward:
  # Execute commands on completion
  commands:
    - "eco give {player} 50"
    - "msg {player} &aExtraction complete! +50 Glitch Shards"
  # Broadcast message
  broadcast:
    enabled: true
    message: "&6{player} &7has extracted from the Glitch!"

# Per-zone configs go in captures/ folder
# Each file = one extraction point

# The Glitch — Phase 1 baseline server.properties.
# Deliberately minimal: Purpur fills in every missing key with defaults on
# first boot, and the deep performance pass lands in Phase 2.
# bootstrap.sh seeds this file ONCE — after that the copy on the box wins
# (motd is the one exception: bootstrap.sh converges it every run).
# Color/formatting codes are written as \uXXXX escapes, not raw UTF-8
# glyphs — a raw multi-byte section-sign mojibakes into "Â§..." if the
# Java properties loader falls back to byte-wise Latin-1 parsing (MC-2215).
motd=\u00A75The Glitch \u00A78\u00BB \u00A77rogue-lite extraction \u00A78[\u00A7dalpha\u00A78]
max-players=30
white-list=true
enforce-whitelist=true
online-mode=true
difficulty=hard
view-distance=5
simulation-distance=4
network-compression-threshold=256
enforce-secure-profile=false
spawn-protection=0
enable-command-block=false
